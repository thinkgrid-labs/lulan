replicaCount: 2

image:
  repository: lulan-api
  tag: latest
  pullPolicy: IfNotPresent

# External services — Lulan never bundles databases in Kubernetes.
# Either put URLs here (templated into a Secret), or set
# existingSecret to a Secret exposing DATABASE_URL / REDIS_URL /
# LULAN_QUOTE_SECRET / LULAN_BOOTSTRAP_ADMIN_KEY keys.
# LULAN_QUOTE_SECRET is REQUIRED (>= 32 chars) and must be identical on
# every replica: it signs the retrieval tokens guests use to reach their
# own bookings, so a per-pod value would break those links. The server
# refuses to start without it. Generate: openssl rand -hex 32
database:
  url: ""            # postgres://user:pass@host:5432/lulan
redis:
  url: ""            # redis://host:6379 (optional; holds degrade without it)
secrets:
  quoteSecret: ""
  bootstrapAdminKey: ""
existingSecret: ""   # takes precedence over the values above

env:
  RUST_LOG: lulan_api=info,lulan_engine=info
  LULAN_RATE_LIMIT: "300"
  LULAN_HOLD_DEFAULT_TTL_SECS: "600"
  LULAN_HOLD_MAX_TTL_SECS: "1800"
  # Fraction of a trip's seats holdable at once ("1" disables).
  LULAN_HOLD_MAX_TRIP_FRACTION: "0.75"
  LULAN_DB_POOL: "32"
  # Browser origins allowed to call the API (comma-separated, or "*").
  # Empty = server-to-server only.
  LULAN_CORS_ALLOWED_ORIGINS: ""
  # Payment provider: a preset name ("stripe") or a mounted description
  # file. EMPTY = the fake provider, which takes no money. Its secrets
  # (LULAN_PAYMENT_SECRET / LULAN_PAYMENT_WEBHOOK_SECRET) belong in the
  # secret above, never here.
  LULAN_PAYMENT_PROVIDER: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: book.example.com
  tls: []
  annotations: {}

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
