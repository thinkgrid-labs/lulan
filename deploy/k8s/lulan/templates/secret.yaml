{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lulan.fullname" . }}
  labels: {{- include "lulan.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "set database.url (or existingSecret)" .Values.database.url | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  LULAN_QUOTE_SECRET: {{ required "set secrets.quoteSecret (or existingSecret)" .Values.secrets.quoteSecret | quote }}
  LULAN_BOOTSTRAP_ADMIN_KEY: {{ required "set secrets.bootstrapAdminKey (or existingSecret)" .Values.secrets.bootstrapAdminKey | quote }}
{{- end }}
