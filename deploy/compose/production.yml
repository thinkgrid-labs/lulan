# Lulan production stack — API + Caddy (auto-TLS).
#
# Databases are EXTERNAL by default: point DATABASE_URL / REDIS_URL at
# your managed PostgreSQL and Redis (RDS, Cloud SQL, ElastiCache, your own
# boxes…). For a self-contained single machine, add the bundled overlay:
#
#   external DBs:  docker compose -f production.yml up -d
#   bundled DBs:   docker compose -f production.yml -f bundled-db.yml up -d
#
# See deploy/README.md for install, backup, restore, and upgrades.

name: lulan

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      LULAN_DOMAIN: ${LULAN_DOMAIN:?set LULAN_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ${LULAN_IMAGE:-lulan-api:latest}
    restart: unless-stopped
    environment:
      # External services — full connection URLs from .env. Falls back to
      # the bundled-db overlay's containers when only POSTGRES_PASSWORD
      # is set.
      DATABASE_URL: ${DATABASE_URL:-postgres://lulan:${POSTGRES_PASSWORD:-}@postgres:5432/lulan}
      # Optional: without Redis, soft holds and rate limiting degrade;
      # bookings stay correct (ADR 0002).
      REDIS_URL: ${REDIS_URL:-}
      LULAN_LISTEN_ADDR: 0.0.0.0:8080
      LULAN_QUOTE_SECRET: ${LULAN_QUOTE_SECRET:?set LULAN_QUOTE_SECRET in .env}
      # Encrypts ticket signing keys at rest, so a database dump cannot
      # forge boarding passes. Unset = keys stored in the clear. Set it and
      # restart to seal existing keys in place. Losing it costs only the
      # ability to sign NEW tickets — rotate to recover.
      LULAN_TICKET_KEY_ENCRYPTION_KEY: ${LULAN_TICKET_KEY_ENCRYPTION_KEY:-}
      LULAN_BOOTSTRAP_ADMIN_KEY: ${LULAN_BOOTSTRAP_ADMIN_KEY:?set LULAN_BOOTSTRAP_ADMIN_KEY in .env}
      # Optional: customer identity (HS256 JWT from your IdP)
      LULAN_IDP_ISSUER: ${LULAN_IDP_ISSUER:-}
      LULAN_IDP_HS256_SECRET: ${LULAN_IDP_HS256_SECRET:-}
      # Preferred over the shared secret: with an asymmetric key Lulan can
      # only verify tokens, never mint them. One adapter covers Auth0,
      # Clerk, Keycloak, Supabase, Firebase and friends.
      LULAN_IDP_JWKS_URL: ${LULAN_IDP_JWKS_URL:-}
      LULAN_IDP_AUDIENCE: ${LULAN_IDP_AUDIENCE:-}
      # Optional: operator pricing module (mount it below)
      LULAN_PRICING_WASM: ${LULAN_PRICING_WASM:-}
      # Payments. A built-in preset name (`stripe`) or a path to a provider
      # description (see deploy/payment-providers/example.json). UNSET MEANS
      # THE FAKE PROVIDER: it captures payment without taking money.
      LULAN_PAYMENT_PROVIDER: ${LULAN_PAYMENT_PROVIDER:-}
      LULAN_PAYMENT_SECRET: ${LULAN_PAYMENT_SECRET:-}
      LULAN_PAYMENT_WEBHOOK_SECRET: ${LULAN_PAYMENT_WEBHOOK_SECRET:-}
      # Optional: browser origins allowed to call the API directly.
      # Comma-separated exact origins, or `*`. Unset = server-to-server
      # only; a storefront calling from the browser needs its origin here
      # (`*` cannot be combined with credentialed requests).
      LULAN_CORS_ALLOWED_ORIGINS: ${LULAN_CORS_ALLOWED_ORIGINS:-}
      # Tuning
      LULAN_RATE_LIMIT: ${LULAN_RATE_LIMIT:-300}
      # Reads get their own bucket so seat-map polling cannot exhaust the
      # budget a customer needs to actually book.
      LULAN_RATE_LIMIT_READS: ${LULAN_RATE_LIMIT_READS:-1200}
      # Caddy sits in front of this service, so exactly one proxy hop is
      # trusted in X-Forwarded-For. Anything a client prepends is ignored.
      LULAN_TRUSTED_PROXY_HOPS: ${LULAN_TRUSTED_PROXY_HOPS:-1}
      LULAN_REQUEST_TIMEOUT_SECS: ${LULAN_REQUEST_TIMEOUT_SECS:-30}
      LULAN_HOLD_DEFAULT_TTL_SECS: ${LULAN_HOLD_DEFAULT_TTL_SECS:-600}
      LULAN_HOLD_MAX_TTL_SECS: ${LULAN_HOLD_MAX_TTL_SECS:-1800}
      # Stampede control: fraction of a trip's seats that may be held
      # at once. >= 1 disables it. Refusing a hold never refuses a sale.
      LULAN_HOLD_MAX_TRIP_FRACTION: ${LULAN_HOLD_MAX_TRIP_FRACTION:-0.75}
      LULAN_DB_POOL: ${LULAN_DB_POOL:-32}
      RUST_LOG: ${RUST_LOG:-lulan_api=info,lulan_engine=info}
    volumes:
      # WASM pricing modules are runtime artifacts, not image layers —
      # drop a module here and point LULAN_PRICING_WASM at it.
      - ./modules:/modules:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
