name: lulan-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lulan
      POSTGRES_PASSWORD: lulan
      POSTGRES_DB: lulan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lulan"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
